name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish PixivOAuthLogin
        run: dotnet publish PixivOAuthLogin.csproj -c Release -r win-x64 --self-contained false -o dist

      - name: Add launcher scripts
        shell: pwsh
        run: |
          Copy-Item GetPixivRefreshToken.bat dist/
          Copy-Item GetPixivRefreshToken.ps1 dist/

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath EzPixivAuth-win-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: EzPixivAuth-win-x64.zip
