name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish PixivOAuthLogin
        run: dotnet publish PixivOAuthLogin.csproj -c Release -r win-x64 --self-contained false -o dist

      - name: Add launcher scripts
        shell: pwsh
        run: |
          Copy-Item GetPixivRefreshToken.bat dist/
          $content = Get-Content -LiteralPath GetPixivRefreshToken.ps1 -Raw
          $utf8Bom = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText('dist/GetPixivRefreshToken.ps1', $content, $utf8Bom)
          $bytes = [System.IO.File]::ReadAllBytes('dist/GetPixivRefreshToken.ps1')[0..2]
          if ($bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
            throw 'GetPixivRefreshToken.ps1 must be UTF-8 with BOM for Windows PowerShell 5.1'
          }

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath EzPixivAuth-win-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: EzPixivAuth-win-x64.zip
